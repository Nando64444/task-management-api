services:
  dev-db:
    image: postgres:15
    ports:
      - 5434:5432                     # Puerto en tu máquina: 5434 → dentro del contenedor: 5432
    environment:
      POSTGRES_USER: nando            # <--- cámbialo a tu nombre o lo que quieras (ej: fernando, nando_dev)
      POSTGRES_PASSWORD: astarte666 # <--- pon tu propia contraseña (fácil para desarrollo local)
      POSTGRES_DB: db_1      # <--- nombre de tu base de datos (puedes poner task_manager, tareas_db, etc.)
    networks:
      - tasknetwork
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nando", "-d", "db_1" ]   # debe coincidir con POSTGRES_USER
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s               # da tiempo para que Postgres inicie

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      dev-db:
        condition: service_healthy
    networks:
      - tasknetwork

volumes:
  postgres-data:

networks:
  tasknetwork: