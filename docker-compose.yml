services:
  dev-db:
    image: postgres:15
    ports:
      - 5434:5432
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secure-dev-2026
      POSTGRES_DB: nest-task
    networks:
      - taskmanagement
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d nest-task"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-db:
    image: postgres:15
    ports:
      - 5435:5432
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secure-dev-2026
      POSTGRES_DB: nest-task-test
    networks:
      - taskmanagement
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d nest-task-test"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      dev-db:
        condition: service_healthy
    networks:
      - taskmanagement

volumes:
  postgres-data:
  postgres-test-data:

networks:
  taskmanagement: